version: "3.9"

services:
  db:
    image: nouchka/sqlite3:latest
    volumes:
      - db-data:/data
    environment:
      - SQLITE_DB=/data/swapshelf.db
    restart: unless-stopped

  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/prisma/prisma
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/prisma/dev.db
      - CRON_SECRET=${CRON_SECRET}
      - CHAT_SERVICE_URL=${CHAT_SERVICE_URL}
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  chat:
    build: .
    command: npx tsx ./mini-services/chat-service/index.ts
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
